appId: com.raunak.claudepad
productName: ClaudePad
directories:
  buildResources: build
  output: release
# asar is DISABLED on purpose: the SDL / node-hid input workers are forked under
# SYSTEM Node (not Electron), and an external Node process cannot read scripts or
# native modules from inside an app.asar archive. Keeping everything on the real
# filesystem lets the workers fork + require normally.
asar: false
# Do NOT let electron-builder rebuild native modules for Electron's ABI. All
# three (nut.js, @kmamal/sdl, node-hid) are N-API / ABI-stable, and SDL+node-hid
# must stay built for SYSTEM Node (that's what the workers run under). Rebuilding
# would re-introduce the Electron-ABI segfault the worker split was designed to
# avoid — and it also needs a working node-gyp/Python toolchain, which this
# machine lacks.
npmRebuild: false
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintrc,.prettierrc,tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
mac:
  # electron-builder emits the .app (dir); scripts/make-dmg.mjs then wraps it in
  # a drag-to-Applications .dmg via hdiutil. We deliberately AVOID electron-
  # builder's own dmg target — it shells out to a vendored Python (dmgbuild) that
  # breaks on modern Homebrew Python. hdiutil is always present on macOS.
  # identity null = unsigned (no Developer ID); users clear the quarantine flag
  # once on first open — see the README. The bundled Node binary (extraResources)
  # lets the SDL/HID worker run on machines with no Node installed.
  target: [dir]
  identity: null
  category: public.app-category.developer-tools
  icon: build/icon.icns
  extraResources:
    - from: build/node
      to: node
win:
  target: [nsis]
linux:
  target: [AppImage]
  category: Utility
